services:
  frieren:
    build: 
      context: ./bot
      dockerfile: Dockerfile
    networks:
      - bot
    env_file:
      - .env
    restart: always

  settings-service:
    container_name: $SETTINGS_ADDRESS
    build: 
      context: ./settings-service
    networks:
      - bot
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      settings-db:
        condition: service_healthy
    restart: always

  user-service:
    container_name: $USER_ADDRESS
    build:
      context: ./user-service
    networks:
      - bot
    env_file:
      - .env
    ports:
      - "8082:8082"
    depends_on:
      user-db:
        condition: service_healthy
    restart: always

  api-gateway:
    container_name: api-gateway
    build: 
      context: ./api-gateway
    networks:
      - bot
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - redis

  settings-db:
    image: postgres:15
    restart: on-failure:5
    container_name: $SETTINGS_POSTGRES_HOST
    environment:
      POSTGRES_USER: $SETTINGS_POSTGRES_USER
      POSTGRES_PASSWORD: $SETTINGS_POSTGRES_PASSWORD
      POSTGRES_DB: $SETTINGS_POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      - ./docker/volumes/pg/settings:/var/lib/postgresql/data
    networks:
      - bot
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $SETTINGS_POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: $REDIS_HOST
    restart: always
    networks:
      - bot
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=$REDIS_PASS
    command: [ "redis-server", "--requirepass", "$REDIS_PASS" ]
    volumes:
      - ./docker/volumes/redis_data:/data 

  user-db:
    image: postgres:15
    restart: on-failure:5
    container_name: $USER_POSTGRES_HOST
    environment:
      POSTGRES_USER: $USER_POSTGRES_USER
      POSTGRES_PASSWORD: $USER_POSTGRES_PASSWORD
      POSTGRES_DB: $USER_POSTGRES_DB
    networks:
        - bot
    volumes:
      - ./docker/volumes/pg/user:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $USER_POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  data: 
    driver: local

networks:
  bot:
    name: bot  