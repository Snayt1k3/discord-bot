syntax = "proto3";

package preferences;

option go_package = "proto/";

// LogService manages a guild's audit-log configuration: which events are
// reported, to which channels, and whether logging is enabled at all.
service LogService {
  // AddLogs routes the given event types to the specified channel and
  // returns the resulting event->channel mapping for the guild.
  rpc AddLogs(UpdateLogChannelRequest) returns (UpdateLogChannelResponse);

  // RemoveLogs stops logging the given event types for the guild.
  rpc RemoveLogs(UpdateLogChannelRequest) returns (RemoveLogChannelResponse);

  // ToggleLog enables or disables event logging for the whole guild.
  rpc ToggleLog(ToggleLogRequest) returns (ToggleLogResponse);
}

message UpdateLogChannelRequest {
  repeated EventType event_type = 1;
  string channel_id = 2;
  string guild_id = 3;
}

message UpdateLogChannelResponse {
  repeated EventSettings event_settings = 1;
  string guild_id = 2;
}

message RemoveLogChannelResponse {
  string guild_id = 1;
}

message ToggleLogRequest {
  string guild_id = 1;
  bool enabled = 2;
}

message ToggleLogResponse {
  string guild_id = 1;
  bool enabled = 2;
}

message EventSettings {
  EventType event = 1;
  string channel_id = 2;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  MESSAGE_DELETE = 1;
  MESSAGE_EDIT   = 2;
  USER_JOIN      = 3;
  USER_LEAVE     = 4;
  CREATE_INVITE  = 5;
  JOIN_CHANNEL   = 6;
  LEAVE_CHANNEL  = 7; 
  MOVE_CHANNEL   = 8; 
}