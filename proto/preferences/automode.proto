syntax = "proto3";

package preferences;

option go_package = "proto/";


// AutoModService manages a guild's automatic moderation rules: the global
// toggle, banned words, and per-channel caps-lock and anti-link filters.
service AutoModService {
  // ToggleAutoMod enables or disables auto-moderation for the whole guild.
  rpc ToggleAutoMod(ToggleAutoModRequest) returns (ToggleAutoModResponse);

  // AddBannedWord adds a word to the guild's banned-words list.
  rpc AddBannedWord(AddBannedWordRequest) returns (AddBannedWordResponse);

  // RemoveBannedWord removes a word from the guild's banned-words list.
  rpc RemoveBannedWord(RemoveBannedWordRequest) returns (RemoveBannedWordResponse);

  // AddCapsLockChannel enables the caps-lock filter in the given channel.
  rpc AddCapsLockChannel(AddCapsLockChannelRequest) returns (AddCapsLockChannelResponse);

  // RemoveCapsLockChannel disables the caps-lock filter in the given channel.
  rpc RemoveCapsLockChannel(RemoveCapsLockChannelRequest) returns (RemoveCapsLockChannelResponse);

  // AddAntiLinkChannel enables the anti-link filter in the given channel.
  rpc AddAntiLinkChannel(AddAntiLinkChannelRequest) returns (AddAntiLinkChannelResponse);

  // RemoveAntiLinkChannel disables the anti-link filter in the given channel.
  rpc RemoveAntiLinkChannel(RemoveAntiLinkChannelRequest) returns (RemoveAntiLinkChannelResponse);
}

message ToggleAutoModRequest {
  string guild_id = 1;
  bool enabled = 2;
}

message ToggleAutoModResponse {
  string guild_id = 1;
  bool enabled = 2;
}

message AddBannedWordRequest {
  string guild_id = 1;
  string word = 2;
}

message AddBannedWordResponse{
  string id = 1;
  string guild_id = 2;
  string word = 3;
}

message RemoveBannedWordRequest {
  string guild_id = 1;
  string word = 2;
}

message RemoveBannedWordResponse {
  string guild_id = 1;
  string word = 2;
}

message AddCapsLockChannelRequest {
  string guild_id = 1;
  string channel_id = 2;
}

message AddCapsLockChannelResponse {
  string id = 1;
  string guild_id = 2;
  string channel_id = 3;
}

message RemoveCapsLockChannelRequest {
  string guild_id = 1;
  string channel_id = 2;
}

message RemoveCapsLockChannelResponse {
  string guild_id = 1;
  string channel_id = 2;
}

message AddAntiLinkChannelRequest {
  string guild_id = 1;
  string channel_id = 2;
}

message AddAntiLinkChannelResponse {
  string id = 1;
  string guild_id = 2;
  string channel_id = 3;
}

message RemoveAntiLinkChannelRequest {
  string guild_id = 1;
  string channel_id = 2;
}

message RemoveAntiLinkChannelResponse {
  string guild_id = 1;
  string channel_id = 2;
}