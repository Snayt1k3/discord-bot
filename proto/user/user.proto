syntax = "proto3";

package user;

option go_package = "proto/";

// ----------------------
// Message definitions
// ----------------------

message User {
  string user_id = 1;
  string guild_id = 2;
  int32 experience = 3;
  int32 level = 4;
  int32 next_level_xp = 5;
  string last_message_at = 6; // ISO timestamp string
  int64 voice_time = 7;
}

enum UserOrderBy {
  USER_ORDER_BY_UNSPECIFIED = 0; // defaults to EXPERIENCE on the server
  EXPERIENCE = 1;
  VOICE_TIME = 2;
}

message GetUserRequest {
  string user_id = 1;
  string guild_id = 2;
}

message GetUserResponse {
  User user = 1;
}

message AddXPRequest {
  string user_id = 1;
  string guild_id = 2;
  int32 xp = 3;
}

message AddXPResponse {
  User user = 1;
  bool level_up = 2; // true если уровень повысился
  int32 added_xp = 3;
}

message AddVoiceTimeRequest {
  string user_id = 1;
  string guild_id = 2;
  int64 seconds = 3;
}

message AddVoiceTimeResponse {
  User user = 1;
}


message GetUsersRequest {
  string guild_id = 1;
  int32 page = 2;
  int32 size = 3;
  bool is_desc_sort = 4;
  UserOrderBy order_by = 5;
}

message GetUsersResponse {
  repeated User users = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 size = 4;
}

// ----------------------
// Service definition
// ----------------------

// UserService manages per-guild user progression: experience, levels and
// accumulated voice activity.
service UserService {
  // GetUser returns the user's progression profile for a given guild.
  // Returns NOT_FOUND if the user has no record in the guild.
  rpc GetUser (GetUserRequest) returns (GetUserResponse);

  // AddXP grants experience to a user and recalculates their level.
  // The response reports whether the user leveled up and how much XP was added.
  rpc AddXP (AddXPRequest) returns (AddXPResponse);

  // AddVoiceTime adds the given number of seconds spent in voice channels
  // to the user's total voice time.
  rpc AddVoiceTime (AddVoiceTimeRequest) returns (AddVoiceTimeResponse);

  // GetUsers returns a paginated, sorted list of users in a guild
  // (e.g. for a leaderboard). Sorting is controlled by order_by/is_desc_sort.
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
}